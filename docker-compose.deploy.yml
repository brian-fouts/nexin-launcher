# Deploy stack: matchmaker-api.loki-console.com (backend), matchmaker.loki-console.com (frontend static).
# Usage: docker-compose -f docker-compose.deploy.yml up --build -d

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.deploy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - matchmaker-backend
      - matchmaker-frontend
      - game-backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 150M

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-nexin}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  matchmaker-backend:
    build:
      context: ./matchmaker-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://matchmaker.loki-console.com,http://localhost:5173,http://127.0.0.1:5173}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "8000:8000"

  matchmaker-frontend:
    build:
      context: .
      dockerfile: matchmaker-frontend/Dockerfile.deploy
      args:
        VITE_API_URL: ${VITE_API_URL:-https://matchmaker-api.loki-console.com}
        VITE_WS_URL: ${VITE_WS_URL:-wss://matchmaker-api.loki-console.com}
        VITE_DISCORD_AUTHORIZE_URL: ${VITE_DISCORD_AUTHORIZE_URL:-https://matchmaker-api.loki-console.com}

  game-backend:
    build:
      context: ./game-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379
      BACKEND_URL: http://matchmaker-backend:8000
      SERVER_NAME: "Nexin Game Server"
      SERVER_DESCRIPTION: "Default game server for matchmaking"
      SERVER_GAME_MODES: '{"mode": "deathmatch"}'
      ROOM_CONFIG: '{"max_rooms": 10, "capacity_per_room": 2}'
      SERVER_PORT: "8001"
      GAME_FRONTEND_URL: ${GAME_FRONTEND_URL:-http://localhost:5174}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
      matchmaker-backend: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py register_with_matchmaker &&
             daphne -b 0.0.0.0 -p 8001 config.asgi:application"
    ports:
      - "8001:8001"

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      MATCHMAKER_BACKEND_URL: ${MATCHMAKER_BACKEND_URL:-http://matchmaker-backend:8000}
    depends_on:
      matchmaker-backend: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres_data:
