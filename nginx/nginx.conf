events {
    worker_connections 1024;
}

http {
    # matchmaker-api.loki-console.com -> matchmaker-backend
    server {
        listen 80;
        server_name matchmaker-api.loki-console.com;

        location / {
            proxy_pass http://matchmaker-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # matchmaker.loki-console.com -> matchmaker-frontend
    server {
        listen 80;
        server_name matchmaker.loki-console.com;

        location / {
            proxy_pass http://matchmaker-frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # game.loki-console.com -> game-frontend
    server {
        listen 80;
        server_name game.loki-console.com;

        location / {
            proxy_pass http://game-frontend:5174;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # game-api.loki-console.com -> game-backend
    server {
        listen 80;
        server_name game-api.loki-console.com;

        location / {
            proxy_pass http://game-backend:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
