# Deploy: same hostnames as local nginx.conf — matchmaker-api -> backend, matchmaker -> frontend (static).
events {
    worker_connections 1024;
}

http {
    error_log /dev/stderr debug;

    log_format verbose '$remote_addr - $remote_user [$time_local] "$request" '
                       'status=$status body_bytes_sent=$body_bytes_sent '
                       'request_time=$request_time '
                       'upstream_response_time=$upstream_response_time '
                       'host="$host" referer="$http_referer" user_agent="$http_user_agent"';
    access_log /dev/stdout verbose;

    # matchmaker-api.loki-console.com -> matchmaker-backend
    server {
        listen 80;
        server_name matchmaker-api.loki-console.com;

        location / {
            proxy_pass http://matchmaker-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # matchmaker.loki-console.com -> matchmaker-frontend (static) + /api -> backend
    server {
        listen 80;
        server_name matchmaker.loki-console.com;

        location /api/ {
            proxy_pass http://matchmaker-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://matchmaker-frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # game.loki-console.com -> game-frontend (static SPA) + /api, /ws -> game-backend
