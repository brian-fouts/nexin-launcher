version: 2.1

parameters:
  game-backend:
    type: boolean
    default: false
  game-frontend:
    type: boolean
    default: false
  tower-defense-backend:
    type: boolean
    default: false
  tower-defense-frontend:
    type: boolean
    default: false
  matchmaker-backend:
    type: boolean
    default: false
  matchmaker-frontend:
    type: boolean
    default: false
  discord-bot:
    type: boolean
    default: false

jobs:
  build-game-backend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push game-backend
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/checkers-backend
            docker build -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 ./game-backend
            docker push $REGISTRY/$IMAGE:$CIRCLE_SHA1
            docker tag $REGISTRY/$IMAGE:$CIRCLE_SHA1 $REGISTRY/$IMAGE:latest
            docker push $REGISTRY/$IMAGE:latest

  build-game-frontend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push game-frontend
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/checkers-frontend
            docker build -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 ./game-frontend
            docker push $REGISTRY/$IMAGE:$CIRCLE_SHA1
            docker tag $REGISTRY/$IMAGE:$CIRCLE_SHA1 $REGISTRY/$IMAGE:latest
            docker push $REGISTRY/$IMAGE:latest

  build-tower-defense-backend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push tower-defense-backend
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/tower-defense-backend
            docker build -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 ./tower-defense-backend
            docker push $REGISTRY/$IMAGE:$CIRCLE_SHA1
            docker tag $REGISTRY/$IMAGE:$CIRCLE_SHA1 $REGISTRY/$IMAGE:latest
            docker push $REGISTRY/$IMAGE:latest

  build-tower-defense-frontend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push tower-defense-frontend
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/tower-defense-frontend
            docker build -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 ./tower-defense-frontend
            docker push $REGISTRY/$IMAGE:$CIRCLE_SHA1
            docker tag $REGISTRY/$IMAGE:$CIRCLE_SHA1 $REGISTRY/$IMAGE:latest
            docker push $REGISTRY/$IMAGE:latest

  build-matchmaker-backend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Set up buildx for multi-arch (amd64 + arm64)
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx use multiarch 2>/dev/null || docker buildx create --name multiarch --use
            docker buildx inspect --bootstrap
      - run:
          name: Build and push matchmaker-backend (multi-arch)
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/matchmaker-backend
            docker buildx build --platform linux/amd64,linux/arm64 \
              -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 -t $REGISTRY/$IMAGE:latest \
              --push ./matchmaker-backend

  build-matchmaker-frontend:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Set up buildx for multi-arch (amd64 + arm64)
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx use multiarch 2>/dev/null || docker buildx create --name multiarch --use
            docker buildx inspect --bootstrap
      - run:
          name: Build and push matchmaker-frontend (multi-arch)
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/matchmaker-frontend
            docker buildx build --platform linux/amd64,linux/arm64 \
              -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 -t $REGISTRY/$IMAGE:latest \
              --push ./matchmaker-frontend

  build-discord-bot:
    docker:
      - image: cimg/aws:2025.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push discord-bot
          command: |
            REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
            IMAGE=loadstone-gaming/discord-bot
            docker build -t $REGISTRY/$IMAGE:$CIRCLE_SHA1 ./discord-bot
            docker push $REGISTRY/$IMAGE:$CIRCLE_SHA1
            docker tag $REGISTRY/$IMAGE:$CIRCLE_SHA1 $REGISTRY/$IMAGE:latest
            docker push $REGISTRY/$IMAGE:latest

workflows:
  build-game-backend:
    when: << pipeline.parameters.game-backend >>
    jobs:
      - build-game-backend
  build-game-frontend:
    when: << pipeline.parameters.game-frontend >>
    jobs:
      - build-game-frontend
  build-tower-defense-backend:
    when: << pipeline.parameters.tower-defense-backend >>
    jobs:
      - build-tower-defense-backend
  build-tower-defense-frontend:
    when: << pipeline.parameters.tower-defense-frontend >>
    jobs:
      - build-tower-defense-frontend
  build-matchmaker-backend:
    when: << pipeline.parameters.matchmaker-backend >>
    jobs:
      - build-matchmaker-backend
  build-matchmaker-frontend:
    when: << pipeline.parameters.matchmaker-frontend >>
    jobs:
      - build-matchmaker-frontend
  build-discord-bot:
    when: << pipeline.parameters.discord-bot >>
    jobs:
      - build-discord-bot
