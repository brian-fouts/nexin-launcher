version: 2.1

parameters:
  game-backend:
    type: boolean
    default: false
  game-frontend:
    type: boolean
    default: false
  tower-defense-backend:
    type: boolean
    default: false
  tower-defense-frontend:
    type: boolean
    default: false
  matchmaker-backend:
    type: boolean
    default: false
  matchmaker-frontend:
    type: boolean
    default: false
  discord-bot:
    type: boolean
    default: false

jobs:
  build-game-backend:
    docker:
      - image: cimg/aws:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push game-backend
          command: |
            docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-game-backend:$CIRCLE_SHA1 ./game-backend
            docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-game-backend:$CIRCLE_SHA1

  build-game-frontend:
    docker:
      - image: cimg/aws:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push game-frontend
          command: |
            docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-game-frontend:$CIRCLE_SHA1 ./game-frontend
            docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-game-frontend:$CIRCLE_SHA1

  build-tower-defense-backend:
    docker:
      - image: cimg/aws:2024.01
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Login to Amazon ECR
          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push tower-defense-backend
          command: |
            docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-tower-defense-backend:$CIRCLE_SHA1 ./tower-defense-backend
