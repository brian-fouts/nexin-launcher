          command: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - run:
          name: Build and push tower-defense-frontend
          command: |
            docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-tower-defense-frontend:$CIRCLE_SHA1 ./tower-defense-frontend
            docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/nexin-launcher-tower-defense-frontend:$CIRCLE_SHA1

  build-matchmaker-backend:
    docker:
      - image: cimg/aws:2024.01
