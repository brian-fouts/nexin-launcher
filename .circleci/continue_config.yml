workflows:
  build-game-backend:
    when: << pipeline.parameters.game-backend >>
    jobs:
      - build-game-backend
  build-game-frontend:
    when: << pipeline.parameters.game-frontend >>
    jobs:
      - build-game-frontend
  build-tower-defense-backend:
    when: << pipeline.parameters.tower-defense-backend >>
    jobs:
      - build-tower-defense-backend
  build-tower-defense-frontend:
    when: << pipeline.parameters.tower-defense-frontend >>
    jobs:
      - build-tower-defense-frontend
  build-matchmaker-backend:
    when: << pipeline.parameters.matchmaker-backend >>
    jobs:
      - build-matchmaker-backend
  build-matchmaker-frontend:
    when: << pipeline.parameters.matchmaker-frontend >>
    jobs:
      - build-matchmaker-frontend
  build-discord-bot:
    when: << pipeline.parameters.discord-bot >>
    jobs:
      - build-discord-bot
