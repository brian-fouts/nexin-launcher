services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - matchmaker-backend
      - matchmaker-frontend
      - game-backend
      - game-frontend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-nexin}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  matchmaker-backend:
    build:
      context: ./matchmaker-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379
      DJANGO_SECRET_KEY: change-me-in-production
      DEBUG: "true"
      # Hostnames from .env (deploy); default below for local
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://matchmaker-frontend:5173}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    ports:
      - "8000:8000"

  game-backend:
    build:
      context: ./game-backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      BACKEND_URL: http://matchmaker-backend:8000
      SERVER_NAME: "Nexin Game Server"
      SERVER_DESCRIPTION: "Default game server for matchmaking"
      SERVER_GAME_MODES: '{"mode": "deathmatch"}'
      SERVER_PORT: "8001"
      # Hostnames from .env (deploy); default below for local
      GAME_FRONTEND_URL: ${GAME_FRONTEND_URL:-http://localhost:5174}
      DJANGO_SECRET_KEY: change-me-in-production
      DEBUG: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://matchmaker-frontend:5173,http://localhost:5174,http://127.0.0.1:5174,http://game-frontend:5174}
    depends_on:
      db: { condition: service_healthy }
      matchmaker-backend: { condition: service_healthy }
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py register_with_matchmaker &&
             gunicorn --bind 0.0.0.0:8001 --workers 2 config.wsgi:application"
    ports:
      - "8001:8001"

  matchmaker-frontend:
    build:
      context: ./matchmaker-frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_URL: http://matchmaker-backend:8000
      # Hostnames from .env (deploy); defaults for local
      VITE_DISCORD_AUTHORIZE_URL: ${VITE_DISCORD_AUTHORIZE_URL:-http://localhost:8000}
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_WS_URL: ${VITE_WS_URL:-}
    depends_on:
      - matchmaker-backend
    ports:
      - "5173:5173"
    volumes:
      - ./matchmaker-frontend:/app
      - /app/node_modules

  game-frontend:
    build:
      context: ./game-frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      GAME_BACKEND_URL: http://game-backend:8001
      # Hostname from .env when deployed (e.g. https://game-api.loki-console.com); empty for local
      VITE_GAME_API_URL: ${VITE_GAME_API_URL:-}
    depends_on:
      - game-backend
    ports:
      - "5174:5174"
    volumes:
      - ./game-frontend:/app
      - /app/node_modules

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      MATCHMAKER_BACKEND_URL: ${MATCHMAKER_BACKEND_URL:-http://matchmaker-backend:8000}
    depends_on:
      matchmaker-backend: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres_data:
